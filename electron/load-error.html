<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FacilityOS</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; color: #1e293b; border-radius: 1rem; padding: 2rem; max-width: 28rem; box-shadow: 0 25px 50px rgba(0,0,0,.25); }
    h1 { font-size: 1.25rem; margin: 0 0 .75rem; }
    p { margin: 0; font-size: .9rem; line-height: 1.5; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <h1>FacilityOS could not start</h1>
    <p id="msg">The application UI could not be loaded.</p>
  </div>
  <script>
    document.getElementById('msg').textContent = decodeURIComponent(
      new URLSearchParams(location.search).get('m') || 'The application UI could not be loaded.'
    );
  </script>
</body>
</html>
