name: Deploy Azure staging tenant

on:
  workflow_dispatch:
    inputs:
      site_slug:
        description: Site identifier (e.g. demo)
        required: true
        default: demo
      docker_tag:
        description: Image tag (e.g. latest or sha)
        required: true
        default: latest

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: azure-staging
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform apply
        working-directory: deploy/terraform/azure/tenant
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -var="site_slug=${{ github.event.inputs.site_slug }}" \
            -var="environment=staging" \
            -var="docker_image=ghcr.io/${{ github.repository }}:${{ github.event.inputs.docker_tag }}"

      - name: Output URL
        working-directory: deploy/terraform/azure/tenant
        run: terraform output public_url
