appId: nz.facility.facilityos.server
productName: FacilityOS Server
extraMetadata:
  facilityosVariant: server
directories:
  output: dist-electron-server
files:
  - dist/**/*
  - electron/**/*
  - server/**/*
  - shared/**/*
  - cloud/**/*
  - node_modules/**/*
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/bcrypt/**/*
  - dist/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FacilityOS Server
  artifactName: FacilityOS.Server.Setup.${version}.exe
  installerLanguages:
    - en_US
publish:
  provider: github
  owner: RWood-Code
  repo: facilityos
