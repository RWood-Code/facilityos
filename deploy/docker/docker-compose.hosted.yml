# FacilityOS Hosted — local dev stack (PostgreSQL + app)
# Usage: docker compose -f deploy/docker/docker-compose.hosted.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: facilityos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: facilityos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-facilityos_dev}
      POSTGRES_DB: facilityos
    volumes:
      - facilityos-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facilityos -d facilityos"]
      interval: 5s
      timeout: 5s
      retries: 10

  facilityos:
    image: ${FACILITYOS_IMAGE:-facilityos:latest}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: facilityos-hosted
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${FACILITYOS_PORT:-3847}:3847"
    environment:
      FACILITYOS_DEPLOYMENT: hosted
      FACILITYOS_DB_DRIVER: postgres
      FACILITYOS_HOST: 0.0.0.0
      FACILITYOS_PORT: 3847
      FACILITYOS_DATABASE_URL: postgresql://facilityos:${POSTGRES_PASSWORD:-facilityos_dev}@postgres:5432/facilityos
      FACILITYOS_DATA_DIR: /var/lib/facilityos/data
      FACILITYOS_PUBLIC_URL: ${FACILITYOS_PUBLIC_URL:-http://localhost:3847}
      FACILITYOS_AUTH_MODE: session
      FACILITYOS_SESSION_SECRET: ${FACILITYOS_SESSION_SECRET:-local-dev-session-secret}
      FACILITYOS_STORAGE: local
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - facilityos-uploads:/var/lib/facilityos
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3847/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  facilityos-pg:
  facilityos-uploads:
