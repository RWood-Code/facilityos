# FacilityOS Self-Host — SQLite in a volume (LAN + browser access on :3847)
# Usage: docker compose -f deploy/docker/docker-compose.selfhost.yml up -d

services:
  facilityos:
    image: ${FACILITYOS_IMAGE:-facilityos:latest}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: facilityos-server
    restart: unless-stopped
    ports:
      - "${FACILITYOS_PORT:-3847}:3847"
    environment:
      FACILITYOS_DEPLOYMENT: selfhost
      FACILITYOS_DB_DRIVER: sqlite
      FACILITYOS_HOST: 0.0.0.0
      FACILITYOS_PORT: 3847
      FACILITYOS_DATA_DIR: /var/lib/facilityos/data
      FACILITYOS_DB_PATH: /var/lib/facilityos/data/facilityos.db
      # Optional remote HTTPS URL (for QR codes / manager links)
      FACILITYOS_PUBLIC_URL: ${FACILITYOS_PUBLIC_URL:-}
      # SMTP (optional — email alerts)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - facilityos-data:/var/lib/facilityos
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3847/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  facilityos-data:
